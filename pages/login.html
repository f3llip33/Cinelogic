<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../style/login.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            Cine<span>Logic</span>
        </div>
    
        <div class="menu-container">
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span class="menu-text">Menu</span>
        </div>
    
        <div class="search-pill">
            <div class="indicator"></div>
        </div>
    
        <div class="login-btn"><a href="../pages/login.html">Login</a></div>
    </header>
    <main class="login-container">
        <form class="login-card">
            <h2>Faça o seu login</h2>

            <div class="input-group">
                <label for="username">Digite o seu nome de usuário:</label>
                <input type="text" id="username" name="username">
            </div>

            <div class="input-group">
                <label for="password">Digite a sua senha:</label>
                <input type="password" id="password" name="password">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms">
                <label for="terms">Aceito a <a href="#">Política de Privacidade</a> e os <a href="#">Termos de Uso</a></label>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>

            <p class="forgot-password">Esqueceu sua senha? <a href="#">Clique aqui!</a></p>
        </form>
    </main>
    

</body>
