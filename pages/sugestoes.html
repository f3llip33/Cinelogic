<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugestões de Filmes</title>
    <link rel="stylesheet" href="../style/sugestoes.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            Cine<span>Logic</span>
        </div>
    
        <div class="menu-container">
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span class="menu-text">Menu</span>
        </div>
    
        <div class="search-pill">
            <div class="indicator"></div>
        </div>
    
        <div class="login-btn"><a href="../pages/login.html">login</a></div>
    </header>

    <main class="sugestoes">
        <h1>SUGESTÕES DE FILMES</h1>

        <form>
            <div class="card-pergunta">
             <h3>1.Qual o Gênero Principal do Seu Filme?</h3>
                <hr>
                <div class="opcoes">
                <label><input type="radio" name="genero" value="comedia">Cómedia</label>
                <label><input type="radio" name="genero" value="acao">Ação</label>
                <label><input type="radio" name="genero" value="terror">Terror</label>
                <label><input type="radio" name="genero" value="romance">Romance</label>
                <label><input type="radio" name="genero" value="ficção">Ficção Científica</label>
                </div>
            </div>

            <div class="card-pergunta">
             <h3>2.Classificação Indicativa?</h3>
                <hr>
                <div class="opcoes">
                <label><input type="radio" name="idade" value="0">Livre</label>
                <label><input type="radio" name="idade" value="10">+10</label>
                <label><input type="radio" name="idade" value="12">+12</label>
                <label><input type="radio" name="idade" value="14">+14</label>
                <label><input type="radio" name="idade" value="16">+16</label>
                <label><input type="radio" name="idade" value="18">+18</label>
                </div>
            </div>

            <div class="card-pergunta">
             <h3>3.Tipo de Produção</h3>
                <hr>
                <div class="opcoes">
                <label><input type="radio" name="producao" value="animacao">Animação</label>
                <label><input type="radio" name="producao" value="live-action">Live-Action</label>
                </div>
            </div>

            <button type="submit" class="enviar">Validar</button>

            
        </form>
    </main>
</body>
